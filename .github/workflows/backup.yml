name: Backup Turso Database

on:
  schedule:
    - cron: '0 2 * * *'
  
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Cài đặt Turso CLI (với tính năng gỡ lỗi)
      - name: Install Turso CLI (with Debugging)
        run: |
          # In ra toàn bộ phản hồi từ API để gỡ lỗi
          echo "--- Fetching latest release info from GitHub API ---"
          API_RESPONSE=$(curl -s "https://api.github.com/repos/tursodatabase/turso-cli/releases/latest")
          echo "$API_RESPONSE"
          echo "----------------------------------------------------"

          # Vẫn thử tìm URL, nhưng chúng ta biết bước này có thể thất bại
          LATEST_URL=$(echo "$API_RESPONSE" | jq -r '.assets[] | select(.name | endswith("linux_x86_64.tar.gz")) | .browser_download_url')

          if [ -z "$LATEST_URL" ]; then
            echo "Error: Could not find a download URL. Please check the JSON output above to see the correct asset filenames."
            exit 1
          fi
          
          # Các lệnh dưới đây sẽ không chạy nếu lỗi xảy ra, đó là điều mong muốn
          echo "Downloading from: $LATEST_URL"
          curl -L -o turso.tar.gz "$LATEST_URL"
          tar -xzf turso.tar.gz
          sudo mv ./turso /usr/local/bin/
          echo "Turso CLI installed successfully:"
          turso --version

      # Các bước sau sẽ không chạy vì bước 1 bị lỗi
      - name: Backup Database
      # ...
