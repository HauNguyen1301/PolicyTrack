name: Backup Turso Database

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Turso CLI (Stable Method)
        run: |
          DOWNLOAD_URL="https://github.com/tursodatabase/turso-cli/releases/download/v0.130.4/turso-v0.130.4-linux-x86_64.tar.gz"
          echo "Downloading from verified URL: $DOWNLOAD_URL"
          curl -L -o turso.tar.gz "$DOWNLOAD_URL"
          echo "Downloaded file info:"
          ls -l turso.tar.gz
          file turso.tar.gz
          if ! file turso.tar.gz | grep -q 'gzip compressed data'; then
            echo "❌ File tải về không phải định dạng gzip, kiểm tra lại URL download!"
            cat turso.tar.gz
            exit 1
          fi
          tar -xzf turso.tar.gz
          sudo mv ./turso /usr/local/bin/
          echo "Turso CLI installed successfully:"
          turso --version

      # Các bước khác giữ nguyên như ban đầu...
