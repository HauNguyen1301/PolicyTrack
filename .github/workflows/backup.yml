name: Backup Turso Database

on:
  schedule:
    # Lên lịch chạy tự động vào 2:00 sáng (UTC) mỗi ngày
    - cron: '0 2 * * *'
  
  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # BƯỚC 1 (ĐÃ THAY ĐỔI): Cài đặt Turso CLI bằng cách tải trực tiếp
      - name: Install Turso CLI
        run: |
          # Lấy URL phiên bản mới nhất từ GitHub API
          LATEST_URL=$(curl -s "https://api.github.com/repos/tursodatabase/turso-cli/releases/latest" | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d : -f 2,3 | tr -d \")
          
          # Tải file về
          curl -L -o turso.tar.gz $LATEST_URL
          
          # Giải nén
          tar -xzf turso.tar.gz
          
          # Di chuyển file thực thi vào thư mục hệ thống
          sudo mv ./turso /usr/local/bin/
          
          # Kiểm tra phiên bản để xác nhận cài đặt thành công
          echo "Turso CLI installed successfully:"
          turso --version

      # Bước 2: Backup CSDL và nén lại
      - name: Backup Database
        id: create_backup_file
        run: |
          export PATH="/usr/local/bin:${HOME}/.turso/bin:${PATH}"
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M")
          FILENAME="backup-${TIMESTAMP}.sql.gz"
          
          echo "Starting backup for policytrack..."
          turso db shell policytrack .dump | gzip > ${FILENAME}
          
          echo "Backup file created: ${FILENAME}"
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
        env:
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      # Bước 3: Cài đặt AWS CLI
      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      # Bước 4: Cấu hình thông tin truy cập Cloudflare R2
      - name: Configure AWS Credentials for R2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: 'auto'

      # Bước 5: Tải file backup lên R2 bằng AWS CLI
      - name: Upload backup to R2
        run: |
          aws s3 cp ${{ steps.create_backup_file.outputs.filename }} s3://${{ secrets.R2_BUCKET_NAME }}/ --endpoint-url ${{ secrets.R2_ENDPOINT_URL }}
