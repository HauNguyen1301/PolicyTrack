name: Backup Turso Database

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
    - name: Install Turso CLI (Stable Method)
      run: |
        DOWNLOAD_URL="https://github.com/tursodatabase/turso-cli/releases/download/v1.0.11/turso-cli_Linux_x86_64.tar.gz"
        echo "Downloading from verified URL: $DOWNLOAD_URL"
        curl -L -o turso.tar.gz "$DOWNLOAD_URL"
        echo "Downloaded file info:"
        ls -l turso.tar.gz
        file turso.tar.gz
        tar -xzf turso.tar.gz
        sudo mv ./turso /usr/local/bin/
        echo "Turso CLI installed successfully:"
        turso --version

      # Các bước khác giữ nguyên như ban đầu...
